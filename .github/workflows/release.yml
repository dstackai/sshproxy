name: Release

on:
  push:
    tags:
      # The project uses PEP 440 version scheme with N.N.N release segment,
      # {a,b,rc}N pre-release segment and .postN post-release segment
      - "[0-9]+.[0-9]+.[0-9]+[ab][0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+rc[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+.post[0-9]+"
  workflow_dispatch:
    inputs:
      version:
        required: true
        type: string

jobs:
  set-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set-version.outputs.version }}
      prerelease: ${{ steps.set-version.outputs.prerelease }}
      latest: ${{ steps.set-version.outputs.latest }}
    steps:
      - id: set-version
        run: |
          if [[ ${{ github.event_name }} = workflow_dispatch ]]; then
            version=${{ inputs.version }}
          else
            version=${{ github.ref_name }}
          fi
          if echo $version | grep -E 'a|b|rc'; then
            prerelease=true
            latest=false
          else
            prerelease=false
            latest=true
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"
          echo "latest=$latest" >> "$GITHUB_OUTPUT"

  build:
    needs: [set-version]
    uses: ./.github/workflows/reusable-build.yml
    with:
      version: ${{ needs.set-version.outputs.version }}

  report:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/download-artifact@v8
      with:
        name: dstack-sshproxy
        path: build
    - run: |
        ls -lR build
        build/dstack-sshproxy --version
