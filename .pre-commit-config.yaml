repos:
  - repo: local
    hooks:
      - id: gomod-fix
        name: gomod-fix
        entry: go mod tidy
        files: ^go\.(mod|sum)$|\.go$
        language: unsupported
        require_serial: true
        pass_filenames: false
  - repo: https://github.com/golangci/golangci-lint
    rev: v2.11.3
    hooks:
      - id: golangci-lint-full
        language_version: 1.26.0
      - id: golangci-lint-fmt
        language_version: 1.26.0
